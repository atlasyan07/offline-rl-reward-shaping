project: offline-rl-reward-shaping
seed: 42
output_dir: outputs/episodic_behavior

env:
  min_rooms: 4
  max_rooms: 6
  max_room_size: 6
  max_steps: 500  # Increased to allow exploratory agent to eventually solve despite circles/backtracking
  lava:
    enabled: false
    tiles_per_room: [0, 0]
  doors:
    open_prob: 1.0
    locked_prob: 0.0
    closed_prob: 0.0

planner:
  algorithm: astar
  max_nodes: 60000
  heuristic_scale_range: [0.9, 1.2]
  allow_lava: true
  max_time_s: 2.0

costs:
  step: 1.0
  turn: 0.2
  toggle: 2.0
  lava_penalty: 10.0
  noise_std: 0.0

dataset:
  min_episodes: 100  # Reduced for episodic testing
  min_transitions: 10000  # Reduced for faster testing
  avg_steps_target: [50, 400]  # Increased upper bound to allow exploratory episodes to complete
  max_env_attempts: 25
  workers: 1  # Single worker for episodic collection
  episodes_per_worker: 2

  # Fixed layouts for structured environments
  fixed_layouts_train:
    - train_easy
    - train_medium
    - train_hard
  fixed_layouts_eval:
    - eval_harder
    - eval_hardest

  # Episodes per layout to see different behavior levels
  episodes_per_layout: 20

  # Behavior policy mix - balanced across all types
  planner_mix:
    near_optimal: 0.25
    noisy: 0.25
    suboptimal: 0.25
    exploratory: 0.25

# Behavior policy configurations with different action levels
behaviors:
  # Level 1: Near-optimal (expert-like)
  # - No mistakes, perfect execution
  # - Clean actions following optimal path
  # - Best for learning optimal policies
  near_optimal:
    random_action_prob: 0.0      # No random actions
    heuristic_noise: 0.0          # No heuristic noise
    cost_noise_std: 0.0           # No cost noise

  # Level 2: Noisy (medium exploration)
  # - Occasional small mistakes (wrong turn, then corrects)
  # - Mostly follows good path with minor detours
  # - Good for robust learning
  noisy:
    random_action_prob: 0.20      # 20% random actions
    heuristic_noise: 0.15         # Slight heuristic perturbation
    cost_noise_std: 0.4           # Moderate cost uncertainty

  # Level 3: Suboptimal (makes real mistakes)
  # - Takes long way around
  # - Goes in circles sometimes
  # - Backtracks and explores wrong corridors
  # - May choose wrong fork then have to go around
  suboptimal:
    random_action_prob: 0.35      # 35% random actions
    heuristic_noise: 0.8          # Higher heuristic noise
    cost_noise_std: 1.2           # Higher cost uncertainty

  # Level 4: Exploratory (lots of mistakes)
  # - Frequent circles and backtracking
  # - Explores both forks before committing
  # - Takes very inefficient paths
  # - Heavy wandering behavior
  exploratory:
    random_action_prob: 0.50      # 50% random actions
    heuristic_noise: 1.2          # Very high heuristic noise
    cost_noise_std: 1.5           # Very high cost uncertainty

# Episode videos - enable to see behavior differences
episode_videos:
  enabled: true
  max_episodes: 20  # Save first 20 episodes (4 per layout across different behaviors)
  fps: 10

# Example videos for each behavior type
videos:
  enabled: true
  fps: 10
  max_steps: 300

plots:
  enabled: true

paths:
  enabled: true
  max_episodes: 10  # Show path overlays for first 10 episodes
