# Realistic behavior collection: Target 70-85% success rate
# Key changes: lower max_steps, enable lava, tune behaviors for failures

project: offline-rl-reward-shaping
seed: 42
output_dir: outputs/behavior_collection_realistic

env:
  min_rooms: 4
  max_rooms: 6
  max_room_size: 6
  max_steps: 50  # VERY SHORT - optimal path is ~25-40 steps, leaves little margin for error
  lava:
    enabled: false  # Keep false - lava is in LAYOUT_SPECS
    tiles_per_room: [0, 0]
  doors:
    open_prob: 1.0
    locked_prob: 0.0
    closed_prob: 0.0

planner:
  algorithm: astar
  max_nodes: 30000  # REDUCED from 60000 - occasionally fails to find path
  heuristic_scale_range: [0.8, 1.4]
  allow_lava: true  # Allow planner to cross lava (risky shortcut)
  max_time_s: 1.0   # REDUCED from 2.0 - faster timeout

costs:
  step: 1.0
  turn: 0.2
  toggle: 2.0
  lava_penalty: 10.0  # REDUCED from 30 - makes lava more tempting (risky)
  noise_std: 0.0

dataset:
  min_episodes: 1
  min_transitions: 200000  # Full run target
  avg_steps_target: [20, 50]
  max_env_attempts: 25
  workers: 1

  fixed_layouts_train:
    - train_easy
    - train_medium
    - train_hard
    - eval_harder
    - eval_hardest
  fixed_layouts_eval: []

  fixed_behavior_order:
    - near_optimal
    - suboptimal_minor
    - suboptimal_major
    - noisy
    - exploratory

  episodes_per_behavior: 1

behaviors:
  # near_optimal: Should succeed ~95%+ (our "expert" demonstrations)
  near_optimal:
    random_action_prob: 0.0  # Pure optimal
    heuristic_noise: 0.0
    cost_noise_std: 0.0

  # suboptimal_minor: Should succeed ~80-90%
  suboptimal_minor:
    random_action_prob: 0.20
    heuristic_noise: 0.3
    cost_noise_std: 0.5

  # suboptimal_major: Should succeed ~60-75%
  suboptimal_major:
    random_action_prob: 0.40
    heuristic_noise: 0.6
    cost_noise_std: 1.0

  # noisy: Should succeed ~40-55%
  noisy:
    random_action_prob: 0.55
    heuristic_noise: 0.9
    cost_noise_std: 1.5

  # exploratory: Should succeed ~20-40%
  exploratory:
    random_action_prob: 0.70
    heuristic_noise: 1.2
    cost_noise_std: 2.0

# Expected overall success rate:
# (95 + 87 + 75 + 57 + 40) / 5 = ~71% average
# With variance: 65-80% range

episode_videos:
  enabled: true
  max_episodes: 25
  fps: 10

videos:
  enabled: true
  fps: 10
  max_steps: 80

plots:
  enabled: true

checkpoint:
  enabled: true
  start_transitions: 10000
  factor: 2.0
  diagnostics: true
  title: "Behavior Dataset Diagnostics (Checkpoint)"

paths:
  enabled: true
  max_episodes: 15
