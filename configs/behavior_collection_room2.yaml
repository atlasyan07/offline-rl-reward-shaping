# Behavior collection with goals ONLY in room 2 (top-right)
# Uses envs_harder.py which constrains goal placement
# Lava is placed dynamically on optimal path

project: offline-rl-reward-shaping
seed: 42
output_dir: outputs/behavior_collection_room2

env:
  min_rooms: 4
  max_rooms: 6
  max_room_size: 6
  max_steps: 100  # Generous - allow suboptimal behaviors to eventually succeed
  # envs_harder.py handles goal placement (room 2 only) and dynamic lava
  lava:
    enabled: false  # Lava is placed dynamically by envs_harder.py
    tiles_per_room: [0, 0]
  doors:
    open_prob: 1.0
    locked_prob: 0.0
    closed_prob: 0.0

planner:
  algorithm: astar
  max_nodes: 10000
  heuristic_scale_range: [0.8, 1.4]
  allow_lava: false  # Never consider lava paths - find alternative route
  max_time_s: 0.3

costs:
  step: 1.0
  turn: 0.2
  toggle: 2.0
  lava_penalty: 1000
  noise_std: 0.0

dataset:
  min_episodes: 1
  min_transitions: 200000
  avg_steps_target: [20, 100]
  max_env_attempts: 25
  workers: 16
  heartbeat_seconds: 5
  checkpoint_every_transitions: 50000
  checkpoint_every_seconds: 0

  fixed_layouts_train:
    - train_easy
    - train_medium
    - train_hard
    - eval_harder
    - eval_hardest
  fixed_layouts_eval: []

  fixed_behavior_order:
    - near_optimal
    - suboptimal_minor
    - suboptimal_major
    - noisy
    - exploratory

  episodes_per_behavior: 250  # ~200K transitions total (5 layouts × 5 behaviors × 250 eps × ~32 steps)

behaviors:
  # near_optimal: Should succeed ~95%+ (expert demonstrations)
  near_optimal:
    random_action_prob: 0.0
    heuristic_noise: 0.0
    cost_noise_std: 0.0

  # suboptimal_minor: Should succeed ~80-90%
  suboptimal_minor:
    random_action_prob: 0.20
    heuristic_noise: 0.3
    cost_noise_std: 0.5

  # suboptimal_major: Should succeed ~60-75%
  suboptimal_major:
    random_action_prob: 0.40
    heuristic_noise: 0.6
    cost_noise_std: 1.0

  # noisy: Should succeed ~40-55%
  noisy:
    random_action_prob: 0.55
    heuristic_noise: 0.9
    cost_noise_std: 1.5

  # exploratory: Should succeed ~20-40%
  exploratory:
    random_action_prob: 0.70
    heuristic_noise: 1.2
    cost_noise_std: 2.0

episode_videos:
  enabled: true
  max_episodes: 25
  fps: 10

videos:
  enabled: false

plots:
  enabled: true

checkpoint:
  enabled: true
  start_transitions: 10000
  factor: 2.0
  diagnostics: true
  title: "Behavior Dataset (Room 2 Goals)"

paths:
  enabled: true
  max_episodes: 15
